# cat mosquitto.conf

[req]
distinguished_name = req_distinguished_name
req_extensions = req_ext
prompt = no

[req_distinguished_name]
C  = XX
ST = State
L  = City
O  = Academic Project
OU = Security Team
CN = mosquitto

[req_ext]
subjectAltName = @alt_names

[alt_names]
IP.1  = 127.0.0.1
DNS.1 = mosquitto
DNS.2 = localhost