name: computer-vision_after

services:
  # ---------------------------------------------------------------------------- #
  #                                    METERS                                    #
  # ---------------------------------------------------------------------------- #
  meter-115138:
    image: m.vinci/meter
    container_name: meter-115138
    networks:
      - energy_net
    env_file:
      - ./envfiles/meter-115138.env
    volumes:
      - ./data/meter/115138.parquet:/meter/data/115138.parquet:ro
      - ./config/meter-115138/ca.crt:/meter/certs/ca.crt
      - ./config/meter-115138/meter-115138.key:/meter/certs/meter-115138.key:ro
      - ./config/meter-115138/meter-115138.crt:/meter/certs/meter-115138.crt:ro

  meter-15805:
    image: m.vinci/meter
    container_name: meter-15805
    networks:
      - energy_net
    env_file:
      - ./envfiles/meter-15805.env
    volumes:
      - ./data/meter/15805.parquet:/meter/data/15805.parquet:ro
      - ./config/meter-15805/ca.crt:/meter/certs/ca.crt
      - ./config/meter-15805/meter-15805.key:/meter/certs/meter-15805.key:ro
      - ./config/meter-15805/meter-15805.crt:/meter/certs/meter-15805.crt:ro

  meter-50176:
    image: m.vinci/meter
    container_name: meter-50176
    networks:
      - energy_net
    env_file:
      - ./envfiles/meter-50176.env
    volumes:
      - ./data/meter/50176.parquet:/meter/data/50176.parquet:ro
      - ./config/meter-50176/ca.crt:/meter/certs/ca.crt
      - ./config/meter-50176/meter-50176.key:/meter/certs/meter-50176.key:ro
      - ./config/meter-50176/meter-50176.crt:/meter/certs/meter-50176.crt:ro

  meter-7001:
    image: m.vinci/meter
    container_name: meter-7001
    networks:
      - energy_net
    env_file:
      - ./envfiles/meter-7001.env
    volumes:
      - ./data/meter/7001.parquet:/meter/data/7001.parquet:ro
      - ./config/meter-7001/ca.crt:/meter/certs/ca.crt
      - ./config/meter-7001/meter-7001.key:/meter/certs/meter-7001.key:ro
      - ./config/meter-7001/meter-7001.crt:/meter/certs/meter-7001.crt:ro

  meter-18052:
    image: m.vinci/meter
    container_name: meter-18052
    networks:
      - energy_net
    env_file:
      - ./envfiles/meter-18052.env
    volumes:
      - ./data/meter/18052.parquet:/meter/data/18052.parquet:ro
      - ./config/meter-18052/ca.crt:/meter/certs/ca.crt
      - ./config/meter-18052/meter-18052.key:/meter/certs/meter-18052.key:ro
      - ./config/meter-18052/meter-18052.crt:/meter/certs/meter-18052.crt:ro

  # ---------------------------------------------------------------------------- #
  #                                   SERVICES                                   #
  # ---------------------------------------------------------------------------- #

  # MQTT Broker
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: mosquitto
    ports:
      - "8883:8883" # MQTT-TLS
    volumes:
      - ./config/mosquitto/acl:/mosquitto/config/acl
      - ./config/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - ./config/mosquitto/certs/:/mosquitto/certs/
      - mosquitto-data:/mosquitto/data
    networks:
      - energy_net

  # Node-RED
  node-red:
    image: nodered/node-red:latest
    container_name: nodered
    volumes:
      - ./data/node-red:/data
      - ./config/nodered/certs:/certs
    networks:
      - energy_net
    ports:
      - "1880:1880"

  postgres:
    build:
      context: .
      dockerfile: postgres.dockerfile
    container_name: postgres
    env_file:
      - ./envfiles/postgres.env
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./config/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./config/postgres/certs/ca.crt:/var/lib/postgresql/ca.crt
      - ./config/postgres/certs/postgres.crt:/var/lib/postgresql/postgres.crt
      - ./config/postgres/certs/postgres.key:/var/lib/postgresql/postgres.key
    secrets:
      - postgres_db
      - postgres_user
      - postgres_password
    networks:
      - energy_net

  # Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    env_file:
      - ./envfiles/grafana.env
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana/certs:/home/grafana/certs
    ports:
      - "3000:3000"
    secrets:
      - grafana_admin_user
      - grafana_admin_password
    networks:
      - energy_net

    forecaster:
      image: m.vinci/forecaster
      container_name: forecaster
      env_file:
        - ./envfiles/forecaster.env
      volumes:
        - ./config/modello-cnn3d/certs:/certs
        - ./data/modello-cnn3d/cnn3d.zip:/forecaster/cnn3d.zip
      secrets:
        - forecaster_db_name
        - forecaster_db_user
        - forecaster_db_password
      networks:
        - energy_net

volumes:
  mosquitto-data:
  postgres-data:
  grafana-data:

networks:
  energy_net:
    driver: bridge

secrets:
  postgres_password:
    file: ./secrets/postgres_password.txt
  postgres_user:
    file: ./secrets/postgres_user.txt
  postgres_db:
    file: ./secrets/postgres_db.txt
  grafana_admin_user:
    file: ./secrets/grafana_admin_user.txt
  grafana_admin_password:
    file: ./secrets/grafana_admin_password.txt
  forecaster_db_name:
    file: ./secrets/forecaster_db_name.txt
  forecaster_db_user:
    file: ./secrets/forecaster_db_user.txt
  forecaster_db_password:
    file: ./secrets/forecaster_db_password.txt