stages:
  preprocessing-interim:
    cmd: uv run computer-vision preprocessing interim
    deps:
      - ./data/1.raw/ECDUY/
      - ./src/computer_vision/preprocessing/interim.py
    outs:
      - ./data/2.interim/ECDUY/

  preprocessing-final:
    cmd: uv run computer-vision preprocessing final
    deps:
      - ./data/2.interim/ECDUY/
      - ./src/computer_vision/preprocessing/final.py
    outs:
      - ./data/3.final/ECDUY/

  plot:
    cmd: uv run computer-vision plot
    deps:
      - ./data/3.final/ECDUY/
      - ./src/computer_vision/plot.py
    outs:
      - ./imgs/

  train:
    cmd: uv run computer-vision train
    deps:
      - ./data/3.final/ECDUY/
      - ./src/computer_vision/train.py
      - ./src/computer_vision/dataset.py
      - ./src/computer_vision/forecasters.py
    params:
      - general
      - models.${general.model}
    outs:
      - ./output/train/

  test:
    cmd: uv run computer-vision test
    deps:
      - ./data/3.final/ECDUY/
      - ./output/train/
      - ./src/computer_vision/test.py
      - ./src/computer_vision/dataset.py
      - ./src/computer_vision/forecasters.py
      - ./src/computer_vision/metrics.py
    params:
      - general
      - test
      - models.${general.model}
    metrics:
      - ./output/test/metrics.yaml
    outs:
      - ./output/test/out/

  evaluate:
    cmd: uv run computer-vision evaluate
    params:
      - general
      - models.${general.model}
    deps:
      - ./data/3.final/ECDUY/
      - ./src/computer_vision/evaluate.py
      - ./src/computer_vision/dataset.py
      - ./src/computer_vision/forecasters.py
      - ./src/computer_vision/metrics.py
    outs:
      - ./eval/out/
    metrics:
      - ./eval/metrics.yaml
