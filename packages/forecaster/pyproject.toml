[project]
name = "forecaster"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
authors = [{ name = "Marco Vinci", email = "m.vinci16@studenti.uniba.it" }]
requires-python = ">=3.12"
dependencies = [
    "holidays>=0.93",
    "keras>=3.13.2",
    "loguru>=0.7.3",
    "pandas>=2.3.3",
    "polars>=1.39.3",
    "psycopg>=3.3.3",
    "sktime>=0.40.1",
    "sqlalchemy>=2.0.48",
    "tensorflow[and-cuda]>=2.21.0",
    "tqdm>=4.67.3",
]

[project.scripts]
forecaster = "forecaster.main:main"

[build-system]
requires = ["uv_build>=0.10.4,<0.11.0"]
build-backend = "uv_build"
