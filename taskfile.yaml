version: "3.8"

tasks:
  certs:
    dir: ./containers
    cmds:
      - ./generate_certs.sh

  architecture-before-up:
    dir: ./architecture/before
    cmds:
      - docker compose up -d
    deps: [build-meter, build-forecaster]

  build-meter:
    dir: ./packages/meter
    cmds:
      - docker build -t m.vinci/meter .

  build-forecaster:
    dir: .
    cmds:
      - docker build -t m.vinci/forecaster .
